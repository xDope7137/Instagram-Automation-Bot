name: code-checker

on:
  push:
    # only build each push to develop and master, other branches are built through pull requests
    branches: [develop, master]
  pull_request:
  workflow_dispatch:
    inputs:
      run-lint:
        description: 'Run lint job'
        required: false
        default: true
        type: boolean
      run-static-check:
        description: 'Run static-check job'
        required: false
        default: true
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run-lint == 'true' || github.event_name == 'push' }}
    steps:
      - name: Clone Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run black
        uses: psf/black@stable

  static-check:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run-static-check == 'true' || github.event_name == 'push' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.7', '3.8', '3.9', '3.10', '3.11']
    steps:
      - name: Clone Repository
        uses: actions/checkout@v3
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Pyflakes
        run: |
          pip3 install --upgrade pip
          pip3 install pyflakes

      - name: Detect errors with pyflakes
        run: pyflakes .
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    strategy:
      matrix:
        python-version: ['3.8', '3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov pytest-mock ruff bandit safety

      - name: Run tests
        run: |
          pytest -q

      - name: Run linter (ruff)
        run: |
          ruff check GramAddict

      - name: Run security static scan (bandit)
        run: |
          bandit -r GramAddict -q || true

      - name: Run dependency vulnerability scan (safety)
        run: |
          safety check -r requirements.txt || true
